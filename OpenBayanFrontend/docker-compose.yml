version: '3.8'

services:
  # ----------------------------------------------------
  # PRODUCTION SERVICE (Nginx + Built Static Files)
  # ----------------------------------------------------
  ide-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hybrid-ide-web
    ports:
      - "8080:80" # Maps your machine's port 8080 to the container's port 80
    restart: unless-stopped
    environment:
      # Inject your Supabase variables here so Vite can use them during the build
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}

  # ----------------------------------------------------
  # DEVELOPMENT ENVIRONMENT
  # ----------------------------------------------------
  ide-dev:
    image: node:20-alpine
    container_name: hybrid-ide-dev
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules # Prevents local node_modules from overwriting container's
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
