name: openbayan-frontend

services:
  frontend:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    command: sleep infinity
    working_dir: /workspaces/openbayan
    ports:
      - "3001:3000"
    environment:
      - SURREAL_HTTP_URL=http://192.168.100.33:8000
      - SURREAL_NAMESPACE=openbayan
      - SURREAL_DATABASE=openbayan
      - SURREAL_ACCESS=account
      - NEXTAUTH_URL=http://localhost:3001
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-openbayan-local-development-secret}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/workspaces/openbayan:cached
      - openbayan_node_modules:/workspaces/openbayan/node_modules
      - openbayan_next_cache:/workspaces/openbayan/.next
      - ../OpenBayanBackend/progress:/workspaces/openbayan/backend_progress:ro
      - ../OpenBayanBackend/notebooks/flows:/workspaces/openbayan/backend_flows:ro
      - ../OpenBayanBackend/docs:/workspaces/openbayan/backend_docs:ro

  next-dev:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    command: sh -lc "npm install --legacy-peer-deps && npm run dev -- --hostname 0.0.0.0"
    working_dir: /workspaces/openbayan
    ports:
      - "3002:3000"
    environment:
      - SURREAL_HTTP_URL=http://192.168.100.33:8000
      - SURREAL_NAMESPACE=openbayan
      - SURREAL_DATABASE=openbayan
      - SURREAL_ACCESS=account
      - NEXTAUTH_URL=http://localhost:3001
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-openbayan-local-development-secret}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/workspaces/openbayan:cached
      - openbayan_node_modules:/workspaces/openbayan/node_modules
      - openbayan_next_cache:/workspaces/openbayan/.next
      - ../OpenBayanBackend/progress:/workspaces/openbayan/backend_progress:ro
      - ../OpenBayanBackend/notebooks/flows:/workspaces/openbayan/backend_flows:ro
      - ../OpenBayanBackend/docs:/workspaces/openbayan/backend_docs:ro

volumes:
  openbayan_node_modules:
  openbayan_next_cache:
